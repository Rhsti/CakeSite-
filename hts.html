<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            justify-content: space-around;
            margin-top: 2rem;
        }
       
        .btn-request{
            padding: 7px 20px;
            background-color: black;
            color: rgb(242, 240, 240); 
            transition: opacity 0.15s; 
             cursor: pointer;   
        }
        .btn-request:hover{
            opacity: 0.8;
        }
        .btn-add{
            background-color: rgb(236, 236, 2);
            border: none;
            border-radius: 10rem;
            padding: 13px 45px;
             cursor: pointer; 
            transition:   background-color 0.15s;
        }
        .btn-add:hover{
            background-color: rgb(185, 185, 5);
        }
        .btn-sign{
            background-color: green;
            color: white;
            border: none;
            padding: 10px 19px;
            border-radius: 0.2rem;
            transition:    box-shadow 0.15s;
            cursor: pointer;
        }
        .btn-sign:hover{
          box-shadow: 3px 3px 10px  rgb(197, 194, 194)

        }
        @media screen and (min-width: 768px) {
            .container{
                display: flex;
                flex-direction: row;
            }
        }

        @media  screen and (min-width: 1024px) {
            .container{
                display: flex;
                flex-direction: row-reverse;
            }
        }
        img{
           display: none;
            width: 50px;
            height: auto;
        }
        .visibleadults{
            display: block;
        }
        p
    {
        display: none;
    }
       .visiblechild{
        display: block;
       }
        
    </style>
</head>
<body>
       <div  class="container">
            <button class="btn-request">Request now</button>
            <button class="btn-add">Add to Cart</button>
            <button class="btn-sign">Sign up</button>
       </div>
      <label for="color">Choose a backgroundcolor.</label>
     <select name="color" id="color">
        <option value="color">Color</option>
        <option value="red">Red</option>
        <option value="green">Green</option>
        <option value="black">Black</option>
        <option value="yellow">Yellow</option>
     </select>

     
        <button class="clickme">Click me!</button>
        <img  src="/cake.jpg" alt="">
        <p>There is noting you are a child.</p>

    <script src="dropdown.js"></script>
</body>
</html>
